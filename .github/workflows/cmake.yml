name: Github Pages

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'  # Once per day

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release


# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally
    # well on Windows or Mac.  You can convert this to a matrix build if you need
    # cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-latest #     

    steps:
    - uses: actions/checkout@v3
    - name: Setup Pages
      uses: actions/configure-pages@v3
      continue-on-error: true
    - name: Requirements
      run: 
        apt-get update 
        && apt-get install sphinx-doc doxygen graphviz libhdf5-dev  libopenblas-dev liblapack-dev liblapacke-dev gpg-agent wget --yes
        && pip3 install sphinx-rtd-theme breathe sphinx-sitemap sphinx==7.1 exhale pydata-sphinx-theme myst-parser

    - name: Configure CMake and Build 
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: |
        cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}  .
        make -C ${{github.workspace}}/build -j12
        touch ${{github.workspace}}/build/docs/sphinx/.nojekyll
        
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      continue-on-error: true
      with:
          # Upload entire repository
          # path: './build/docs/sphinx'
          path: '${{github.workspace}}/build/docs/sphinx'
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      continue-on-error: true
    # Add a empty commit 
    - name: Add empty commit to trigger deployment
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git commit --allow-empty -m "Trigger GitHub Pages deployment" || echo "No changes to commit"
        git push origin HEAD:main
